<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fullerene → Catalan-like Polyhedron Viewer</title>
<style>
  :root {
    --bg: #f7f6f3;
    --panel-bg: #ffffff;
    --border: #ddd8cf;
    --text: #24211b;
    --text-dim: #6b6559;
    --accent: #7a5ea8;
    --accent-dim: #b6a0d6;
    --danger: #b5502e;
    --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    --ok: #2c7a4b;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }
  #app { display: flex; height: 100vh; width: 100vw; }
  #canvasWrap { flex: 1 1 auto; position: relative; }
  canvas { display: block; width: 100%; height: 100%; }
  #panel { width: 360px; flex: 0 0 360px; background: var(--panel-bg); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; font-size: 13px; }
  h1 { font-size: 15px; margin: 0 0 4px; font-weight: 600; }
  .sub { color: var(--text-dim); font-size: 11px; margin-bottom: 16px; }
  section { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  section:last-child { border-bottom: none; }
  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim); margin-bottom: 6px; }
  .row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  input[type=range] { flex: 1; accent-color: var(--accent); }
  input[type=number] { width: 56px; font-family: var(--mono); border: 1px solid var(--border); border-radius: 4px; padding: 3px 5px; background: #fff; color: var(--text); }
  button { font-family: inherit; font-size: 12px; border: 1px solid var(--border); background: #fff; color: var(--text); border-radius: 5px; padding: 6px 10px; cursor: pointer; transition: background .12s, border-color .12s; }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  button.primary:hover:not(:disabled) { background: #644d8a; }
  button.toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btnrow { display: flex; gap: 6px; flex-wrap: wrap; }
  .btnrow button { flex: 1 1 auto; }
  .readout { font-family: var(--mono); font-size: 12px; line-height: 1.75; }
  .readout .k { color: var(--text-dim); }
  .readout .v { float: right; }
  .readout .v.hit { color: var(--ok); font-weight: 700; }
  .tglrow { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
  .tglrow input { accent-color: var(--accent); }
  .msg { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; min-height: 1.4em; }
  .msg.err { color: var(--danger); }
  #selftest { font-family: var(--mono); font-size: 10.5px; line-height: 1.6; white-space: pre-wrap; max-height: 220px; overflow-y: auto; background: #fbfaf7; border: 1px solid var(--border); border-radius: 5px; padding: 8px; }
  .pass { color: var(--ok); }
  .fail { color: var(--danger); font-weight: 700; }
  #hud { position: absolute; left: 12px; bottom: 10px; font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: rgba(255,255,255,.7); padding: 4px 8px; border-radius: 4px; pointer-events: none; }
  a.exportlink { display:none; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <div id="canvasWrap">
    <canvas id="c"></canvas>
    <div id="hud"></div>
  </div>
  <div id="panel">
    <h1>Fullerene → Catalan-like solid</h1>
    <div class="sub">σ contracts the 12 pentagons of C<sub>2n+20</sub> to poles, producing C(n)</div>

    <section>
      <label for="nInput">n — hexagon count (20–60)</label>
      <div class="row">
        <input type="range" id="nSlider" min="20" max="60" step="1" value="20">
        <input type="number" id="nInput" min="20" max="60" step="1" value="20">
      </div>
      <div class="msg" id="nMsg"></div>
    </section>

    <section>
      <button id="generateBtn" class="primary" style="width:100%; padding:10px; font-size:13px;">Generate</button>
      <div class="msg" id="genMsg"></div>
    </section>

    <section>
      <button id="contractBtn" class="primary" style="width:100%; padding:10px; font-size:13px;">Contract poles →</button>
    </section>

    <section>
      <label>Readout</label>
      <div class="readout" id="readout"></div>
    </section>

    <section>
      <label>Display</label>
      <div class="tglrow"><span>Colour faces by shape</span><input type="checkbox" id="tglColor" checked></div>
      <div class="tglrow"><span>Show edges</span><input type="checkbox" id="tglEdges" checked></div>
      <div class="tglrow"><span>Show midsphere</span><input type="checkbox" id="tglSphere"></div>
      <div class="tglrow"><span>Mark poles (deg-5)</span><input type="checkbox" id="tglPoles"></div>
      <div class="tglrow"><span>Auto-rotate</span><input type="checkbox" id="tglSpin"></div>
      <div id="legend" style="font-size:11px; line-height:1.8; margin-top:8px;"></div>
    </section>

    <section>
      <label>Export</label>
      <button id="exportBtn" style="width:100%;">Download OFF file</button>
      <a class="exportlink" id="exportLink"></a>
    </section>

    <section>
      <label>Self-test (runs on load)</label>
      <div id="selftest">running…</div>
    </section>
  </div>
</div>

<script src="three.min.js"></script>
<script src="catalan_data.js"></script>
<script src="catalan_invalid_data.js"></script>
<script src="geometry.js"></script>
<script src="render.js"></script>
<script src="app.js"></script>
</body>
</html>
